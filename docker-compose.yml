services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend Python (FastAPI) ──
  backend-py:
    build: ./backend-py
    ports:
      - 8000:8000
    env_file:
      - ./backend-py/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    command: sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  # ── API Express (Node.js) ──
  api:
    build: ./api
    ports:
      - 4000:4000
    env_file:
      - ./api/.env
    environment:
      - INDEXER_URL=http://graphql-engine:3000
    depends_on:
      - postgres
    restart: always

  # ── SubQuery Node (Indexer) ──
  subquery-node:
    image: onfinality/subql-node:latest
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    environment:
      DB_USER: postgres
      DB_PASS: ${DB_PASSWORD:-postgres}
      DB_DATABASE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ./:/app
    command:
      - -f=/app
      - --db-schema=app
      - --batch-size=100
      - --workers=4
      - --disable-historical

  # ── GraphQL Engine (SubQuery Query) ──
  graphql-engine:
    image: onfinality/subql-query:latest
    ports:
      - 3000:3000
    depends_on:
      - postgres
      - subquery-node
    restart: always
    environment:
      DB_USER: postgres
      DB_PASS: ${DB_PASSWORD:-postgres}
      DB_DATABASE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
    command:
      - --name=app
      - --playground
      - --indexer=http://subquery-node:3000

volumes:
  postgres_data:
