services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - explorer-network

  # ── Backend Python (FastAPI) ──
  backend-py:
    build:
      context: ./backend-py
      target: development
    ports:
      - 8000:8000
    volumes:
      - ./backend-py:/app
    env_file:
      - ./backend-py/.env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - explorer-network
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── API Express (Node.js) ──
  api:
    build: ./api
    ports:
      - 4000:4000
    env_file:
      - ./api/.env
    environment:
      - INDEXER_URL=http://graphql-engine:3000
    depends_on:
      - postgres
    restart: always
    networks:
      - explorer-network

  # ── SubQuery Build (compiles TypeScript → dist/) ──
  subquery-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run build"
    profiles:
      - build

  # ── SubQuery Node (Indexer) ──
  subquery-node:
    image: onfinality/subql-node:latest
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    environment:
      DB_USER: postgres
      DB_PASS: ${DB_PASSWORD:-postgres}
      DB_DATABASE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ./:/app
    command:
      - -f=/app
      - --db-schema=app
      - --batch-size=100
      - --workers=4
      - --disable-historical
    networks:
      - explorer-network

  # ── GraphQL Engine (SubQuery Query) ──
  graphql-engine:
    image: onfinality/subql-query:latest
    ports:
      - 3000:3000
    depends_on:
      - postgres
      - subquery-node
    restart: always
    environment:
      DB_USER: postgres
      DB_PASS: ${DB_PASSWORD:-postgres}
      DB_DATABASE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
    command:
      - --name=app
      - --playground
      - --indexer=http://subquery-node:3000
    networks:
      - explorer-network

  # ── Frontend (React/Vite) ──
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - 5175:5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_GRAPHQL_URL=http://localhost:3000
      - VITE_WS_ENDPOINTS=wss://ws-archive.lunes.io,wss://ws-lunes-main-02.lunes.io
      - HOST=0.0.0.0
    depends_on:
      - api
      - graphql-engine
      - backend-py
    networks:
      - explorer-network

volumes:
  postgres_data:


networks:
  explorer-network:
    driver: bridge
